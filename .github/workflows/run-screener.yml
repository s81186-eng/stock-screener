name: Run Stock Screener

on:
  workflow_dispatch:
  schedule:
    - cron: '30 3 * * 1-5'   # 9:00 AM IST, Mon-Fri (cron runs in UTC)

jobs:
  run-screener:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install kiteconnect pandas ta pyotp playwright
          playwright install --with-deps chromium

      - name: Auto-login and get access token
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
          KITE_USER_ID: ${{ secrets.KITE_USER_ID }}
          KITE_PASSWORD: ${{ secrets.KITE_PASSWORD }}
          KITE_TOTP_SECRET: ${{ secrets.KITE_TOTP_SECRET }}
        run: python auto_login.py >> $GITHUB_ENV

      - name: Run screener script
        env:
          KITE_API_KEY: ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET: ${{ secrets.KITE_API_SECRET }}
        run: python screener.py

      - name: Commit updated results.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results.json
          git commit -m "Update results.json" || echo "No changes to commit"
          git push
