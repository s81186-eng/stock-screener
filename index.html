<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Screener</title>
<style>
  body {
    font-family: -apple-system, Segoe UI, Roboto, sans-serif;
    background: #0f1115;
    color: #e8e8e8;
    margin: 0;
    padding: 16px;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .updated { font-size: 12px; color: #888; margin-bottom: 16px; }
  .card {
    background: #1a1d24;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    border-left: 4px solid #3ddc84;
  }
  .row { display: flex; justify-content: space-between; align-items: baseline; }
  .symbol { font-size: 17px; font-weight: 600; }
  .score { font-size: 17px; font-weight: 700; color: #3ddc84; }
  .meta { font-size: 12px; color: #999; margin-top: 2px; }
  ul { margin: 8px 0 0 0; padding-left: 18px; font-size: 13px; color: #cfcfcf; }
  li { margin-bottom: 2px; }
  .loading { color: #888; }

  .token-box {
    background: #1a1d24;
    border: 2px solid #3ddc84;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .token-box h2 { margin: 0 0 8px 0; font-size: 16px; }
  .token-value {
    font-family: monospace;
    font-size: 14px;
    background: #0f1115;
    padding: 10px;
    border-radius: 6px;
    word-break: break-all;
    margin-bottom: 10px;
  }
  .copy-btn {
    background: #3ddc84;
    color: #0f1115;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 14px;
    width: 100%;
  }
</style>
</head>
<body>

<div id="tokenSection"></div>

<h1>📈 Stock Screener</h1>
<div class="updated" id="updated">Loading...</div>
<div id="list" class="loading">Fetching results...</div>

<script>
  // Check if a request_token is in the URL (from Kite login redirect)
  const params = new URLSearchParams(window.location.search);
  const requestToken = params.get('request_token');

  if (requestToken) {
    const section = document.getElementById('tokenSection');
    section.innerHTML = `
      <div class="token-box">
        <h2>🔑 Login Token</h2>
        <div class="token-value" id="tokenValue">${requestToken}</div>
        <button class="copy-btn" onclick="copyToken()">Copy Token</button>
      </div>
    `;
  }

  function copyToken() {
    const text = document.getElementById('tokenValue').textContent;
    navigator.clipboard.writeText(text).then(() => {
      alert('Copied! Now go to GitHub Actions and paste it.');
    });
  }

  // Load results.json as before
function renderCard(stock) {
    const cs = stock.category_scores || {};
    const pBar = fillBar(cs.pattern || 0, 40);
    const tBar = fillBar(cs.trend_momentum || 0, 30);
    const vBar = fillBar(cs.volume_smart_money || 0, 20);

    const reasonsHtml = (stock.reasons || []).map(r => {
      const cls = classifyReason(r);
      return `<li class="${cls}">${r}</li>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div class="rank-symbol">
          <span class="rank">#${stock.rank}</span>
          <div class="symbol-block">
            <div class="symbol">${stock.symbol}</div>
            <div class="exchange-price">${stock.exchange} · ₹${stock.ltp.toLocaleString('en-IN')}</div>
          </div>
        </div>
        <div class="score-pill">${stock.score}</div>
      </div>
      <div class="summary">${stock.summary || ''}</div>
      <div class="breakdown">
        <div class="bd-item">
          <div class="bd-label">Pattern</div>
          <div class="bd-bar"><div class="bd-fill ${pBar.cls}" style="width:${pBar.pct}%"></div></div>
          <div class="bd-val">${cs.pattern ?? '—'}</div>
        </div>
        <div class="bd-item">
          <div class="bd-label">Trend</div>
          <div class="bd-bar"><div class="bd-fill ${tBar.cls}" style="width:${tBar.pct}%"></div></div>
          <div class="bd-val">${cs.trend_momentum ?? '—'}</div>
        </div>
        <div class="bd-item">
          <div class="bd-label">Volume</div>
          <div class="bd-bar"><div class="bd-fill ${vBar.cls}" style="width:${vBar.pct}%"></div></div>
          <div class="bd-val">${cs.volume_smart_money ?? '—'}</div>
        </div>
      </div>
      <details>
        <summary>Technical details</summary>
        <ul class="reasons">${reasonsHtml}</ul>
      </details>
    `;
    return card;
  }

  fetch('results.json?t=' + Date.now())
    .then(res => res.json())
    .then(data => {
      const when = new Date(data.generated_at);
      const dateStr = when.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short' });
      const timeStr = when.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
      document.getElementById('updated').textContent =
        `Updated ${dateStr}, ${timeStr} · scanned ${data.universe_size || '—'} stocks`;

      const list = document.getElementById('list');
      list.className = '';
      list.innerHTML = '';

      const nifty = data.nifty500_stocks || [];
      const penny = data.penny_stocks || [];

      if (nifty.length === 0 && penny.length === 0) {
        list.innerHTML = '<div class="loading">No stocks scored positively today.</div>';
        return;
      }

      const niftyHeading = document.createElement('h2');
      niftyHeading.className = 'section-heading';
      niftyHeading.textContent = `Regular stocks (above ₹${data.penny_threshold || 50})`;
      list.appendChild(niftyHeading);

      if (nifty.length === 0) {
        list.innerHTML += '<div class="loading">None scored positively today.</div>';
      } else {
        nifty.forEach(stock => list.appendChild(renderCard(stock)));
      }

      const pennyHeading = document.createElement('h2');
      pennyHeading.className = 'section-heading';
      pennyHeading.textContent = `Penny stocks (below ₹${data.penny_threshold || 50})`;
      list.appendChild(pennyHeading);

      if (penny.length === 0) {
        const none = document.createElement('div');
        none.className = 'loading';
        none.textContent = 'None scored positively today.';
        list.appendChild(none);
      } else {
        penny.forEach(stock => list.appendChild(renderCard(stock)));
      }
    })
    .catch(err => {
      document.getElementById('list').textContent = 'Failed to load results. Try refreshing.';
      console.error(err);
    });

  data.stocks_UNUSED = [];
  function unused_old(stock) {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="row">
            <div class="symbol">#${stock.rank} ${stock.symbol}</div>
            <div class="score">${stock.score}</div>
          </div>
          <div class="meta">${stock.exchange} • ₹${stock.ltp}</div>
          <ul>${stock.reasons.map(r => `<li>${r}</li>`).join('')}</ul>
        `;
        list.appendChild(card);
      });
    })
    .catch(err => {
      document.getElementById('list').textContent = 'Failed to load results.json';
      console.error(err);
    });
</script>

</body>
</html>
